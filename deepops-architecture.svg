<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117;">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="personAGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="personBGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0.5" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bc8cff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="url(#headerGrad)" font-size="28" font-weight="bold" filter="glow">DeepOps Architecture</text>
  <text x="600" y="62" text-anchor="middle" fill="#8b949e" font-size="14">Self-Healing Codebase Agent | Deep Agents Hackathon</text>

  <!-- Person A zone -->
  <rect x="20" y="80" width="570" height="800" rx="12" fill="url(#personAGrad)" stroke="#1f6feb" stroke-width="1" opacity="0.3"/>
  <text x="40" y="108" fill="#58a6ff" font-size="14" font-weight="bold">PERSON A: Agent Core + Intelligence</text>

  <!-- Person B zone -->
  <rect x="610" y="80" width="570" height="800" rx="12" fill="url(#personBGrad)" stroke="#8957e5" stroke-width="1" opacity="0.3"/>
  <text x="630" y="108" fill="#bc8cff" font-size="14" font-weight="bold">PERSON B: Infra, Actions, Dashboard &amp; Voice</text>

  <!-- ===== PERSON B: Demo App (top right) ===== -->
  <rect x="750" y="130" width="180" height="55" rx="8" fill="#161b22" stroke="#f85149" stroke-width="2" filter="shadow"/>
  <text x="840" y="153" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">DEMO APP</text>
  <text x="840" y="173" text-anchor="middle" fill="#8b949e" font-size="10">(FastAPI + intentional bugs)</text>

  <!-- ===== PERSON B: Airbyte ===== -->
  <rect x="750" y="220" width="180" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2" filter="shadow"/>
  <text x="766" y="244" fill="#3fb950" font-size="10">🔄</text>
  <text x="840" y="243" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Airbyte</text>
  <text x="840" y="263" text-anchor="middle" fill="#8b949e" font-size="10">Ingest error logs</text>

  <!-- Arrow: Demo App -> Airbyte -->
  <line x1="840" y1="185" x2="840" y2="218" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="860" y="205" fill="#8b949e" font-size="9">errors</text>

  <!-- ===== SHARED: Aerospike (center) ===== -->
  <rect x="480" y="310" width="240" height="70" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2.5" filter="shadow"/>
  <text x="506" y="340" fill="#f0883e" font-size="12">⚡</text>
  <text x="600" y="339" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Aerospike</text>
  <text x="600" y="358" text-anchor="middle" fill="#8b949e" font-size="11">Real-time state store</text>
  <text x="600" y="372" text-anchor="middle" fill="#f0883e" font-size="9">SHARED CONTRACT</text>

  <!-- Arrow: Airbyte -> Aerospike -->
  <path d="M 750,248 Q 680,248 680,310" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="700" y="278" fill="#3fb950" font-size="9">write incidents</text>

  <!-- ===== PERSON A: Agent Core (left center) ===== -->
  <rect x="120" y="300" width="260" height="90" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2.5" filter="shadow"/>
  <text x="250" y="328" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Agent Core</text>
  <text x="250" y="348" text-anchor="middle" fill="#58a6ff" font-size="11">Python + LLM Orchestration</text>
  <text x="250" y="368" text-anchor="middle" fill="#8b949e" font-size="10">detect > diagnose > fix > route</text>

  <!-- Arrow: Aerospike <-> Agent Core -->
  <line x1="480" y1="345" x2="382" y2="345" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="382" y1="355" x2="480" y2="355" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)" stroke-dasharray="6,3"/>
  <text x="425" y="338" fill="#f0883e" font-size="9">read/write</text>

  <!-- ===== PERSON A: Macroscope ===== -->
  <rect x="50" y="440" width="180" height="55" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="shadow"/>
  <text x="66" y="463" fill="#58a6ff" font-size="10">🔍</text>
  <text x="140" y="462" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Macroscope</text>
  <text x="140" y="483" text-anchor="middle" fill="#8b949e" font-size="10">Codebase understanding</text>

  <!-- Arrow: Agent Core -> Macroscope -->
  <path d="M 200,390 L 160,438" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="145" y="420" fill="#58a6ff" font-size="9">query codebase</text>

  <!-- ===== PERSON A: Kiro ===== -->
  <rect x="270" y="440" width="180" height="55" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="shadow"/>
  <text x="286" y="463" fill="#58a6ff" font-size="10">👻</text>
  <text x="360" y="462" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Kiro</text>
  <text x="360" y="483" text-anchor="middle" fill="#8b949e" font-size="10">Spec-driven code fix</text>

  <!-- Arrow: Agent Core -> Kiro -->
  <path d="M 300,390 L 340,438" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="340" y="420" fill="#58a6ff" font-size="9">generate fix</text>

  <!-- ===== PERSON A: Overmind (wrapping everything) ===== -->
  <rect x="35" y="535" width="450" height="65" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="2" filter="shadow" stroke-dasharray="8,4"/>
  <text x="51" y="563" fill="#bc8cff" font-size="10">⚙️</text>
  <text x="260" y="562" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Overmind</text>
  <text x="260" y="582" text-anchor="middle" fill="#8b949e" font-size="10">Traces every LLM call + agent decision. Continuous optimization.</text>

  <!-- Dashed lines from Overmind wrapping Agent Core, Macroscope, Kiro -->
  <path d="M 260,535 L 260,495" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 140,535 L 140,497" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 360,535 L 360,497" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== SEVERITY DECISION (center) ===== -->
  <polygon points="600,450 660,490 600,530 540,490" fill="#161b22" stroke="#f0883e" stroke-width="2" filter="shadow"/>
  <text x="600" y="487" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">Severity</text>
  <text x="600" y="501" text-anchor="middle" fill="#f0883e" font-size="9">Check</text>

  <!-- Arrow: Agent writes decision -> Aerospike -> Severity check -->
  <line x1="600" y1="380" x2="600" y2="448" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ===== PERSON B: Auth0 ===== -->
  <rect x="700" y="420" width="180" height="55" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="2" filter="shadow"/>
  <text x="716" y="443" fill="#8957e5" font-size="10">🔐</text>
  <text x="790" y="442" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Auth0</text>
  <text x="790" y="463" text-anchor="middle" fill="#8b949e" font-size="10">RBAC gating</text>

  <!-- Arrow: Severity -> Auth0 -->
  <line x1="660" y1="480" x2="698" y2="455" stroke="#8957e5" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="680" y="460" fill="#8b949e" font-size="9">check permissions</text>

  <!-- ===== LOW SEVERITY PATH ===== -->
  <!-- Person B: TrueFoundry -->
  <rect x="640" y="570" width="200" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2" filter="shadow"/>
  <text x="660" y="593" fill="#3fb950" font-size="10">🚀</text>
  <text x="740" y="592" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">TrueFoundry</text>
  <text x="740" y="612" text-anchor="middle" fill="#8b949e" font-size="10">Deploy fix to production</text>

  <!-- Arrow: Auth0 (low sev) -> TrueFoundry -->
  <path d="M 790,475 L 790,530 L 750,568" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="798" y="520" fill="#3fb950" font-size="9">low/med: auto-deploy</text>

  <!-- ===== HIGH SEVERITY PATH ===== -->
  <!-- Person B: Bland AI -->
  <rect x="900" y="530" width="180" height="55" rx="8" fill="#161b22" stroke="#f85149" stroke-width="2" filter="shadow"/>
  <text x="916" y="553" fill="#f85149" font-size="10">🎙️</text>
  <text x="990" y="552" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Bland AI</text>
  <text x="990" y="572" text-anchor="middle" fill="#8b949e" font-size="10">Voice-call engineer</text>

  <!-- Arrow: Auth0 (high sev) -> Bland AI -->
  <path d="M 880,448 L 940,448 L 970,528" fill="none" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="930" y="480" fill="#f85149" font-size="9">high/crit:</text>
  <text x="930" y="492" fill="#f85149" font-size="9">escalate</text>

  <!-- Arrow: Bland AI -> TrueFoundry (after approval) -->
  <path d="M 940,585 Q 880,620 842,600" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <text x="880" y="618" fill="#3fb950" font-size="9">approved? deploy</text>

  <!-- ===== PERSON B: Dashboard ===== -->
  <rect x="700" y="670" width="200" height="55" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="2" filter="shadow"/>
  <text x="800" y="693" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Dashboard</text>
  <text x="800" y="713" text-anchor="middle" fill="#8b949e" font-size="10">Real-time agent status UI</text>

  <!-- Arrow: Aerospike -> Dashboard -->
  <path d="M 620,380 Q 650,500 750,668" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="690" y="640" fill="#f0883e" font-size="9">poll status</text>

  <!-- ===== FLOW NUMBERS ===== -->
  <circle cx="840" cy="200" r="11" fill="#58a6ff"/>
  <text x="840" y="204" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">1</text>

  <circle cx="680" cy="290" r="11" fill="#58a6ff"/>
  <text x="680" y="294" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">2</text>

  <circle cx="430" cy="340" r="11" fill="#58a6ff"/>
  <text x="430" y="344" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">3</text>

  <circle cx="165" cy="415" r="11" fill="#58a6ff"/>
  <text x="165" y="419" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">4</text>

  <circle cx="335" cy="415" r="11" fill="#58a6ff"/>
  <text x="335" y="419" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">5</text>

  <circle cx="600" cy="425" r="11" fill="#58a6ff"/>
  <text x="600" y="429" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">6</text>

  <circle cx="935" cy="505" r="11" fill="#58a6ff"/>
  <text x="935" y="509" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">7</text>

  <circle cx="720" cy="555" r="11" fill="#58a6ff"/>
  <text x="720" y="559" text-anchor="middle" fill="#0d1117" font-size="10" font-weight="bold">8</text>

  <!-- ===== LEGEND ===== -->
  <rect x="35" y="660" width="450" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="685" fill="#e6edf3" font-size="13" font-weight="bold">Data Flow</text>
  
  <circle cx="60" cy="710" r="9" fill="#58a6ff"/>
  <text x="60" y="714" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">1</text>
  <text x="78" y="714" fill="#8b949e" font-size="10">Error occurs in Demo App</text>

  <circle cx="60" cy="730" r="9" fill="#58a6ff"/>
  <text x="60" y="734" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">2</text>
  <text x="78" y="734" fill="#8b949e" font-size="10">Airbyte ingests error into pipeline</text>

  <circle cx="60" cy="750" r="9" fill="#58a6ff"/>
  <text x="60" y="754" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">3</text>
  <text x="78" y="754" fill="#8b949e" font-size="10">Agent reads incident from Aerospike</text>

  <circle cx="60" cy="770" r="9" fill="#58a6ff"/>
  <text x="60" y="774" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">4</text>
  <text x="78" y="774" fill="#8b949e" font-size="10">Macroscope provides codebase context</text>

  <circle cx="280" cy="710" r="9" fill="#58a6ff"/>
  <text x="280" y="714" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">5</text>
  <text x="298" y="714" fill="#8b949e" font-size="10">Kiro plans + writes code fix</text>

  <circle cx="280" cy="730" r="9" fill="#58a6ff"/>
  <text x="280" y="734" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">6</text>
  <text x="298" y="734" fill="#8b949e" font-size="10">Auth0 RBAC severity gate</text>

  <circle cx="280" cy="750" r="9" fill="#58a6ff"/>
  <text x="280" y="754" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">7</text>
  <text x="298" y="754" fill="#8b949e" font-size="10">Bland AI calls engineer (if high)</text>

  <circle cx="280" cy="770" r="9" fill="#58a6ff"/>
  <text x="280" y="774" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">8</text>
  <text x="298" y="774" fill="#8b949e" font-size="10">TrueFoundry deploys fix</text>

  <text x="55" y="810" fill="#bc8cff" font-size="10">⚙️ Overmind wraps the entire agent, tracing every decision</text>
  <text x="55" y="830" fill="#f0883e" font-size="10">⚡ Aerospike is the shared contract between Person A and B</text>

  <!-- Team labels -->
  <rect x="55" y="845" width="12" height="12" rx="2" fill="#1f6feb"/>
  <text x="75" y="856" fill="#58a6ff" font-size="10">Person A owns</text>
  <rect x="180" y="845" width="12" height="12" rx="2" fill="#8957e5"/>
  <text x="200" y="856" fill="#bc8cff" font-size="10">Person B owns</text>
  <rect x="305" y="845" width="12" height="12" rx="2" fill="#f0883e"/>
  <text x="325" y="856" fill="#f0883e" font-size="10">Shared</text>
</svg>
