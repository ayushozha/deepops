version: 1
scope: update-1
owner: yossitv
requirements:
  - update-1.md
  - ../../README.md
  - ../implementation-alignment.md
  - ../incident.schema.json
  - ../../demo-app/README.md
execution_notes:
  - "`task.yml` を唯一のソースにし、agent 別ビューは `python docs/yossitv/render_task_views.py docs/yossitv` で再生成する。"
  - U1-001 を先に開始し、U1-002 と U1-003 と U1-005 は `demo-app/main.py` だけを触る前提で並列に進めてよい。
  - U1-004 は U1-001 と U1-002/U1-003 の成果を受けて、apply と verify と deploy の責務を `DeploymentService` に集約する。
  - U1-006 は local patch path が動いた後に着手する。`pytest` と必要な資格情報が無い間は docs と検証手順の整備を先に進める。
context:
  current_state:
    - "`agent/orchestrator.py` は incident を `stored -> diagnosing -> fixing -> gating` まで進め、diagnosis と fix 生成までは実装済み。"
    - "`server/services/demo_flow_service.py` は policy 判定、approval 分岐、`DeploymentService` 呼び出しまで接続済みで、`POST /api/agent/run-once` から run-once フローを起動できる。"
    - "`agent/fixer.py` は `spec_markdown`, `diff_preview`, `files_changed`, `test_plan` を返すが、Kiro が使えない場合は fallback の擬似 diff を返すだけで、repo の実ファイルは書き換えない。"
    - "`agent/kiro_client.py` は Kiro CLI の stdout から diff を抽出するだけで、Kiro が repo を実際に編集したかの検証や、未トリムの patch 保持をしていない。"
    - "`server/services/fix_artifact_service.py` と `server/services/deployment_service.py` は artifact と deployment status を扱うが、`demo-app/main.py` の apply, rollback, verification は持っていない。"
    - "`server/integrations/truefoundry_client.py` の submit body は service metadata 中心で、patch/spec 自体は送っていない。API key が無い場合は `MockTrueFoundryClient` が常に成功扱いにする。"
    - "`demo-app/main.py` には `/calculate/{a}/{b}`, `/user/{username}`, `/search` の意図的バグが 2026-03-28 時点でも残っている。"
    - "`tests/test_fixer.py`, `server/tests/test_deployment_service.py`, `server/tests/test_agent_demo_flow.py` は payload と status 遷移を主に検証しており、repo mutation や修復後の demo-app 挙動は未検証。"
    - "2026-03-28 に `python -m pytest -q tests/test_fixer.py tests/test_orchestrator.py server/tests/test_deployment_service.py server/tests/test_agent_demo_flow.py` を試したが、この環境には `pytest` が入っておらず実行できなかった。"
  assumptions:
    - "最短でデモを本物に近づける経路は、まず local workspace の `demo-app/main.py` を確実に書き換えること。その後に TrueFoundry 連携を live mode へ寄せる。"
    - "`fix.diff_preview` は dashboard 表示用 preview とし、実 apply には未トリムの patch か構造化 edit を別経路で扱う。"
    - "自動変更対象は `demo-app/` 配下に限定し、repo 外パスや任意ファイル変更は拒否する。"
  agent_guidance:
    codex.task: "推論を長く使い、契約整理、service 統合、rollback 方針、deploy 判定、検証計画を担当する。"
    claude code.task: "具体的な patch 生成、file apply 実装、demo-app の修正、テスト追加を高速に進める。"
tasks:
  - task_id: U1-001
    title: "real fix 実行契約と設定値を先に固定する"
    description: |
      `update-1.md` の曖昧さを消し、run-once -> fix -> apply -> verify -> deploy の authoritative path を先に固定する。
      対象:
      - `config.py` に local apply 用の設定値を追加する。候補は `DEEPOPS_FIX_REPO_ROOT`, `DEEPOPS_ENABLE_LOCAL_PATCH_APPLY`, `DEEPOPS_ENABLE_TRUEFOUNDRY_DEPLOY`。
      - `server/services/fix_artifact_service.py` か新 service のインターフェースで、dashboard 用 `diff_preview` と実 apply 用 full patch / structured edit を分離する。
      - `server/services/deployment_service.py` が「apply 成功前に resolved にしない」契約を持てるよう、必要な入出力と失敗時の戻り値を整理する。
      - apply / verify / deploy の各段階で `timeline` と `observability` に何を残すかを決める。
      完了条件:
      - downstream task が依存できる入力/出力 shape が 1 箇所にまとまっている。
      - local patch mode と dry-run/mock mode の切替条件がコード上で明確になっている。
      - `fix` schema を壊さずに full patch を扱う置き場が決まっている。
    status: ready
    agent: codex.task
  - task_id: U1-002
    title: "Kiro 不在でも apply 可能な full patch を生成できるようにする"
    description: |
      `agent/fixer.py` を、preview diff だけでなく実 apply に使える patch 生成器として使える状態に寄せる。
      対象:
      - divide-by-zero, missing user, blocking search の 3 既知 bug class について、現在の `demo-app/main.py` に clean apply できる full diff か構造化 edit を返す。
      - `diff_preview` は dashboard 用の短い preview のまま維持し、実 apply 用 patch は U1-001 の契約に従って別経路で保持する。
      - fallback diff の hunk context と `files_changed` を実ファイルの現状に合わせ、擬似的な component 名が混ざらないようにする。
      - `tests/test_fixer.py` か新規テストで、各 bug class が `demo-app/main.py` を対象にした apply 可能な出力を返すことを固定する。
      完了条件:
      - Kiro が使えない環境でも 3 つのデモバグ全てで apply 可能な edit 指示が得られる。
      - dashboard 表示用 preview は壊れない。
      - non-schema の fix 情報が stored incident の `fix` に漏れない。
    status: ready
    agent: claude code.task
  - task_id: U1-003
    title: "workspace の `demo-app/main.py` を安全に書き換える patch applier を実装する"
    description: |
      local workspace 上で実際にファイルを変更する責務を 1 箇所に切り出す。
      対象:
      - `server/services/` か `agent/` に patch apply service を追加し、unified diff か構造化 edit をファイルへ反映する。
      - path traversal 防止、repo root 制約、backup 作成、rollback、no-op 判定、apply failure の詳細エラーを実装する。
      - apply 結果として `files_touched`, `backup_path`, `applied_at_ms`, `error` などを返し、上位 service が incident に記録できるようにする。
      - temp directory を使うテストで、成功ケース、壊れた patch、禁止パス、rollback を固定する。
      完了条件:
      - `demo-app/main.py` の実ファイル変更が自動化される。
      - apply failure 時に incident を `failed` に倒せるだけの情報が返る。
      - `demo-app/` 以外のパスは変更できない。
    status: ready
    agent: claude code.task
  - task_id: U1-004
    title: "DeploymentService を real apply -> verify -> deploy の単一路にまとめる"
    description: |
      deploy を「status を進めるだけ」の実装から、実際に fix を実行したうえで進める service へ置き換える。
      対象:
      - `server/services/demo_flow_service.py::_deploy_incident` から apply / verify / deploy の詳細を外し、`DeploymentService` に集約する。
      - auto-deploy と manual approval deploy の両方が同じ service path を通るように整理する。
      - local patch apply 後に targeted verification を実行し、成功した場合のみ `resolved` に進める。verify 失敗時は rollback する。
      - `server/integrations/truefoundry_client.py` は live deploy に必要な payload を見直すか、credentials 不在時の local-only mode を明示する。
      完了条件:
      - `resolved` は local apply と verification が通ったときだけ付く。
      - approval 経由と auto-deploy 経由で deploy の実装が分岐しない。
      - failure 理由と rollback 結果が `timeline` か `observability` に残る。
    status: blocked
    agent: codex.task
  - task_id: U1-005
    title: "demo-app 修復後の expected behavior を固定する tests と smoke check を追加する"
    description: |
      修復が「incident status だけ」ではなく、実際の API 挙動に反映されたことを確認できるようにする。
      対象:
      - `demo-app` か `server/tests` に 3 既知バグの回帰テストを追加する。
      - `/calculate/0` は handled 4xx or safe JSON を返すこと、`/user/unknown` は handled 404 系レスポンスを返すこと、`/search` は blocking `time.sleep(5)` を残さないことを固定する。
      - `demo-app/pitch.sh` か補助 script に before/after の確認手順を加え、ライブデモで「本当にコードが変わった」と示せるようにする。
      - `pytest` が無い環境でも、あとで実行できるコマンドと前提を docs に残す。
      完了条件:
      - 3 つの canonical demo bugs に対する repeatable な verification path がある。
      - pitch/demo のナレーションで、status 遷移ではなく挙動改善を見せられる。
    status: ready
    agent: claude code.task
  - task_id: U1-006
    title: "end-to-end の受け入れ手順と live rehearsal 前提を docs に固める"
    description: |
      コードが揃ったあとに、人が迷わず通し確認できるように最後の受け入れ条件を固める。
      対象:
      - `README.md`, `demo-app/README.md`, 必要なら `docs/yossitv/update-1.md` に local patch mode, required env vars, `pytest` 依存, live rehearsal 手順を追記する。
      - `server/tests/test_agent_demo_flow.py` か追加の integration test で、incident が file apply の結果に依存して `resolved` / `failed` へ進むことを固定する。
      - running demo-app と optional `TRUEFOUNDRY_API_KEY` が揃った環境で、`POST /api/agent/run-once` が本当にファイルを変えてから resolve することを確認する。
      完了条件:
      - live rehearsal の前提とコマンドが repo 内に 1 箇所で揃う。
      - end-to-end 受け入れ条件を README だけで辿れる。
      - 実行環境が足りない場合に何が足りないか docs から判断できる。
    status: blocked
    agent: codex.task
