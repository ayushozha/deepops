tasks:
- task_id: U1-002
  title: Kiro 不在でも apply 可能な full patch を生成できるようにする
  description: |
    `agent/fixer.py` を、preview diff だけでなく実 apply に使える patch 生成器として使える状態に寄せる。
    対象:
    - divide-by-zero, missing user, blocking search の 3 既知 bug class について、現在の `demo-app/main.py` に clean apply できる full diff か構造化 edit を返す。
    - `diff_preview` は dashboard 用の短い preview のまま維持し、実 apply 用 patch は U1-001 の契約に従って別経路で保持する。
    - fallback diff の hunk context と `files_changed` を実ファイルの現状に合わせ、擬似的な component 名が混ざらないようにする。
    - `tests/test_fixer.py` か新規テストで、各 bug class が `demo-app/main.py` を対象にした apply 可能な出力を返すことを固定する。
    完了条件:
    - Kiro が使えない環境でも 3 つのデモバグ全てで apply 可能な edit 指示が得られる。
    - dashboard 表示用 preview は壊れない。
    - non-schema の fix 情報が stored incident の `fix` に漏れない。
  status: ready
  agent: claude.task
- task_id: U1-003
  title: workspace の `demo-app/main.py` を安全に書き換える patch applier を実装する
  description: |
    local workspace 上で実際にファイルを変更する責務を 1 箇所に切り出す。
    対象:
    - `server/services/` か `agent/` に patch apply service を追加し、unified diff か構造化 edit をファイルへ反映する。
    - path traversal 防止、repo root 制約、backup 作成、rollback、no-op 判定、apply failure の詳細エラーを実装する。
    - apply 結果として `files_touched`, `backup_path`, `applied_at_ms`, `error` などを返し、上位 service が incident に記録できるようにする。
    - temp directory を使うテストで、成功ケース、壊れた patch、禁止パス、rollback を固定する。
    完了条件:
    - `demo-app/main.py` の実ファイル変更が自動化される。
    - apply failure 時に incident を `failed` に倒せるだけの情報が返る。
    - `demo-app/` 以外のパスは変更できない。
  status: ready
  agent: claude.task
- task_id: U1-005
  title: demo-app 修復後の expected behavior を固定する tests と smoke check を追加する
  description: |
    修復が「incident status だけ」ではなく、実際の API 挙動に反映されたことを確認できるようにする。
    対象:
    - `demo-app` か `server/tests` に 3 既知バグの回帰テストを追加する。
    - `/calculate/0` は handled 4xx or safe JSON を返すこと、`/user/unknown` は handled 404 系レスポンスを返すこと、`/search` は blocking `time.sleep(5)` を残さないことを固定する。
    - `demo-app/pitch.sh` か補助 script に before/after の確認手順を加え、ライブデモで「本当にコードが変わった」と示せるようにする。
    - `pytest` が無い環境でも、あとで実行できるコマンドと前提を docs に残す。
    完了条件:
    - 3 つの canonical demo bugs に対する repeatable な verification path がある。
    - pitch/demo のナレーションで、status 遷移ではなく挙動改善を見せられる。
  status: ready
  agent: claude.task
